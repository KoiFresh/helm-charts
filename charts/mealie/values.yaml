## @section Bitnami&reg; PostgreSQL parameters
##

## PostgreSQL configuration
## ref: https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
postgresql:
  ## @param postgresql.enabled Enable or disable the PostgreSQL subchart
  ##
  enabled: true
  # Image configuration for the postgres container. Use the official postgres image by default, instead of the bitnami image.
  image:
    ## @param postgresql.image.registry Registry for the postgres container image
    ##
    registry: docker.io
    ## @param postgresql.image.repository Repository for the postgres container image
    ##
    repository: library/postgres
    ## @param postgresql.image.tag Tag for the postgres container image
    ##
    tag: 16.13-bookworm
  ## Authentication parameters
  ## ref: https://github.com/bitnami/containers/tree/main/bitnami/postgresql#setting-the-root-password-on-first-run
  ## ref: https://github.com/bitnami/containers/tree/main/bitnami/postgresql#creating-a-database-on-first-run
  ## ref: https://github.com/bitnami/containers/tree/main/bitnami/postgresql#creating-a-database-user-on-first-run
  ##
  auth:
    ## @param postgresql.auth.enablePostgresUser Assign a password to the "postgres" admin user. Otherwise, remote access will be blocked for this user
    ##
    enablePostgresUser: true
    ## @param postgresql.auth.postgresPassword Password for the "postgres" admin user. Ignored if `auth.existingSecret` is provided
    ##
    postgresPassword: "postgres"
    ## @param postgresql.auth.username Name for a custom user to create
    ##
    username: "postgres"
    ## @param postgresql.auth.password Password for the custom user to create. Ignored if `auth.existingSecret` is provided
    ##
    password: "postgres"
    ## @param postgresql.auth.database Name for a custom database to create
    ##
    database: "mealie"
    ## @param postgresql.auth.usePasswordFiles Mount credentials as a files instead of using an environment variable
    ##
    usePasswordFiles: false
  ## PostgreSQL Primary parameters
  ##
  primary:
    ## @param postgresql.primary.name Name of the primary database (eg primary, master, leader, ...)
    ##
    name: primary
    ## PostgreSQL Primary persistence configuration
    ##
    persistence:
      ## @param postgresql.primary.persistence.enabled Enable PostgreSQL Primary data persistence using PVC
      ##
      enabled: true
      ## @param postgresql.primary.persistence.existingClaim Name of an existing PVC to use
      ##
      existingClaim: ""
      ## @param postgresql.primary.persistence.storageClass PVC Storage Class for PostgreSQL Primary data volume
      ## If defined, storageClassName: <storageClass>
      ## If set to "-", storageClassName: "", which disables dynamic provisioning
      ## If undefined (the default) or set to null, no storageClassName spec is
      ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
      ##   GKE, AWS & OpenStack)
      ##
      storageClass: ""
      ## @param postgresql.primary.persistence.accessModes PVC Access Mode for PostgreSQL volume
      ##
      accessModes:
        - ReadWriteOnce
      ## @param postgresql.primary.persistence.size PVC Storage Request for PostgreSQL volume
      ##
      size: 5Gi
    # Extra volume mounts for /var/run/postgresql to allow postgres creating a socket while keeping a read only root filesystem
    extraVolumeMounts:
      ## @skip postgresql.primary.extraVolumeMounts[0].name An extra volume mount for the postgres socket
      ##
      - name: postgresql-socket
        ## @skip postgresql.primary.extraVolumeMounts[0].mountPath The path of the postgres socket
        ##
        mountPath: /var/run/postgresql
    extraVolumes:
      ## @skip postgresql.primary.extraVolumes[0].name An extra volume for the postgres socket
      ##
      - name: postgresql-socket
        ## @skip postgresql.primary.extraVolumes[0].emptyDir An empty dir mount for the postgres socket
        ##
        emptyDir: {}
