image:
  # -- The Docker registry to pull the image from
  registry: ghcr.io

  # -- The registry repository to pull the image from
  repository: mealie-recipes/mealie

  # -- The image tag to pull
  tag: ""

  # -- The image digest to pull
  digest: ""

  # -- The Kubernetes image pull policy
  pullPolicy: IfNotPresent

  # -- A list of secrets to use for pulling images from private registries
  pullSecrets: []
  #  - myRegistryKeySecretName

# -- String to partially override mealie.fullname
nameOverride: ""

# -- String to fully override mealie.fullname
fullnameOverride: ""

mealie:
  # -- The puid to use insidde the container
  puid: 1000

  # -- The guid to use insised the container
  guid: 1000

  # -- The port mealie listens on
  port: 9000

  # -- The timezone mealie should use e.g. UTC or Europe/Berlin
  timeZone: UTC

  # -- Additional env variables to configure, see: https://docs.mealie.io/documentation/getting-started/installation/backend-config/
  env:
    DB_ENGINE: posgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_SERVER: mealie-postgresql
    POSTGRES_PORT: "5432"
    POSTGRES_DB: mealie

  # -- Additional env variables from secrets or config maps
  envFrom:
  #  - configMapRef:
  #      name: mealie-config
  #  - secretRef:
  #      name: mealie-secret

ingress:
  # -- The host mealie listens to
  host: mealie.helm.private

  # -- Whether to enable Ingress
  enabled: false

  # -- The IngressClass to use for the pod's ingress
  className: ""

  # -- Annotations for the Ingress resource
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"

  # -- A list of hostnames and secret names to use for TLS
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

service:
  # -- The type of service to create
  type: ClusterIP

  # -- The port to use on the service
  port: 8000

  # -- The Node port to use on the service
  nodePort: 30080

  # -- Extra ports to add to the service
  extraPorts: []
  #  - name: https
  #    protocol: TCP
  #    port: 443
  #    targetPort: 9377

  # --Annotations for the service resource
  annotations: {}

  # -- Labels for the service resource
  labels: {}

  # -- The external traffic policy for the service
  externalTrafficPolicy: Cluster

  # -- The internal traffic policy for the service
  internalTrafficPolicy: Cluster

  # -- Define a static cluster IP for the service
  clusterIP: ""

  # -- Set the Load Balancer IP
  loadBalancerIP: ""

  # -- Define Load Balancer class if service type is `LoadBalancer` (optional, cloud specific)
  loadBalancerClass: ""

  # -- Service Load Balancer source ranges
  loadBalancerSourceRanges: []
  #  - 10.10.10.0/24

  # -- Service External IPs
  externalIPs: []
  #  - 10.10.10.1
  #  - 201.22.30.1

  # -- Session Affinity for Kubernetes service, can be "None" or "ClientIP". If "ClientIP", consecutive client requests will be directed to the same Pod
  sessionAffinity: None

  # -- Additional settings for the sessionAffinity
  sessionAffinityConfig: {}
  #  clientIP:
  #    timeoutSeconds: 300

  # -- The ipFamilyPolicy
  ipFamilyPolicy: ""

livenessProbe:
  # -- Enable or disable the use of liveness probes
  enabled: false

  # -- Configure the initial delay seconds for the liveness probe
  initialDelaySeconds: 5

  # -- Configure the initial delay seconds for the liveness probe
  timeoutSeconds: 1

  # -- Configure the seconds for each period of the liveness probe
  periodSeconds: 10

  # -- Configure the success threshold for the liveness probe
  successThreshold: 1

  # -- Configure the failure threshold for the liveness probe
  failureThreshold: 10

readinessProbe:
  # -- Enable or disable the use of readiness probes
  enabled: false

  # -- Configure the initial delay seconds for the readiness probe
  initialDelaySeconds: 5

  # -- Configure the initial delay seconds for the readiness probe
  timeoutSeconds: 1

  # -- Configure the seconds for each period of the readiness probe
  periodSeconds: 10

  # -- Configure the success threshold for the readiness probe
  successThreshold: 1

  # -- Configure the failure threshold for the readiness probe
  failureThreshold: 3

startupProbe:
  # -- Enable or disable the use of readiness probes
  enabled: false

  # -- Configure the initial delay seconds for the startup probe
  initialDelaySeconds: 5

  # -- Configure the initial delay seconds for the startup probe
  timeoutSeconds: 1

  # -- Configure the seconds for each period of the startup probe
  periodSeconds: 10

  # -- Configure the success threshold for the startup probe
  successThreshold: 1

  # -- Configure the failure threshold for the startup probe
  failureThreshold: 10

# -- Then number of replicas
replicas: 1

# -- The resource limits/requests for the Paperless pod
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# -- Define volumes for the mealie pod
extraVolumes: []
#  - name: data
#    emptyDir: {}

# -- Define volumeMounts for the mealie pod
extraVolumeMounts: []
#  - name: data
#    mountPath: /data

# -- Define initContainers for the main mealie pod
initContainers: []

# -- Node labels for pod assignment ref: https://kubernetes.io/docs/user-guide/node-selection/
nodeSelector: {}

# -- Tolerations for pod assignment ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
tolerations: []

# -- Affinity for pod assignment ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
affinity: {}

# -- Specify a deployment strategy for the Mealie pod
strategy: {}
#  type: RollingUpdate
#  rollingUpdate:
#    maxUnavailable: 1

# -- Extra annotations for the Mealie pod
podAnnotations: {}

# -- Extra labels for the Mealie pod
podLabels: {}
#  pod-security.kubernetes.io/warn: privileged
#  pod-security.kubernetes.io/audit: privileged
#  pod-security.kubernetes.io/enforce: baseline

# -- The name of an existing PriorityClass ref: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
priorityClassName: ""

# -- Security context settings for the Paperless pod ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext: {}
# fsGroup: 1001
# supplementalGroups:
#   - 1001

# -- General security context settings for ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
securityContext: {}
# allowPrivilegeEscalation: false
# privileged: false
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsGroup: 1001
# runAsUser: 1001
# capabilities:
#   drop:
#     - ALL

# -- PostgreSQL configuration ref: https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
postgresql:
  # -- Enable or disable the PostgreSQL subchart
  enabled: true

  # -- Image configuration for the postgres container. Use the official postgres image by default, instead of the bitnami image.
  image:
    # -- Registry for the postgres container image
    registry: docker.io

    # -- Repository for the postgres container image
    repository: library/postgres

    # -- Tag for the postgres container image
    tag: 16.13-bookworm

  ## Authentication parameters
  ## ref: https://github.com/bitnami/containers/tree/main/bitnami/postgresql#setting-the-root-password-on-first-run
  ## ref: https://github.com/bitnami/containers/tree/main/bitnami/postgresql#creating-a-database-on-first-run
  ## ref: https://github.com/bitnami/containers/tree/main/bitnami/postgresql#creating-a-database-user-on-first-run
  ##
  auth:
    # -- Assign a password to the "postgres" admin user. Otherwise, remote access will be blocked for this user
    enablePostgresUser: true

    # -- Password for the "postgres" admin user. Ignored if `auth.existingSecret` is provided
    postgresPassword: "postgres"

    # -- Name for a custom user to create
    username: "postgres"

    # -- Password for the custom user to create. Ignored if `auth.existingSecret` is provided
    password: "postgres"

    # -- Name for a custom database to create
    database: "mealie"

    # -- Mount credentials as a files instead of using an environment variable
    usePasswordFiles: false

  primary:
    # -- Name of the primary database (eg primary, master, leader, ...)
    name: primary

    persistence:
      # -- Enable PostgreSQL Primary data persistence using PVC
      enabled: true

      # -- Name of an existing PVC to use
      existingClaim: ""

      # -- PVC Storage Class for PostgreSQL Primary data volume If defined, storageClassName: <storageClass>
      # If set to "-", storageClassName: "", which disables dynamic provisioning
      # If undefined (the default) or set to null, no storageClassName spec is
      # set, choosing the default provisioner.  (gp2 on AWS, standard on
      # GKE, AWS & OpenStack)
      storageClass: ""

      # -- PVC Access Mode for PostgreSQL volume
      accessModes:
        - ReadWriteOnce

      # -- PVC Storage Request for PostgreSQL volume
      size: 5Gi

    # Extra volume mounts for /var/run/postgresql to allow postgres creating a socket while keeping a read only root filesystem
    extraVolumeMounts:
      ## @skip postgresql.primary.extraVolumeMounts[0].name An extra volume mount for the postgres socket
      ##
      - name: postgresql-socket
        ## @skip postgresql.primary.extraVolumeMounts[0].mountPath The path of the postgres socket
        ##
        mountPath: /var/run/postgresql
    extraVolumes:
      ## @skip postgresql.primary.extraVolumes[0].name An extra volume for the postgres socket
      ##
      - name: postgresql-socket
        ## @skip postgresql.primary.extraVolumes[0].emptyDir An empty dir mount for the postgres socket
        ##
        emptyDir: {}
